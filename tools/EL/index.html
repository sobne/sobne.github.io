// ----- EL Expression Parser -----
// Parse EL expression string into nodes and connections for visualization

// Simple tokenizer: splits EL expression into tokens
// Tokens: keyword(THEN|WHEN|SWITCH|IF|FOR|WHILE), DOT, TO, DO, COMMA, LPAREN, RPAREN, IDENTIFIER, SEMICOLON
function tokenize(expr) {
  const tokens = [];
  let i = 0;
  while (i < expr.length) {
    // Skip whitespace
    if (/\s/.test(expr[i])) { i++; continue; }
    // Match keywords/identifiers
    if (/[A-Za-z_]/i.test(expr[i])) {
      let word = '';
      while (i < expr.length && /[A-Za-z0-9_]/i.test(expr[i])) {
        word += expr[i++];
      }
      const upper = word.toUpperCase();
      if (['THEN', 'WHEN', 'SWITCH', 'IF', 'FOR', 'WHILE', 'DO', 'TO'].includes(upper)) {
        tokens.push({ type: upper, value: word });
      } else {
        tokens.push({ type: 'IDENTIFIER', value: word });
      }
      continue;
    }
    // Punctuation
    if (expr[i] === '(') { tokens.push({ type: 'LPAREN', value: '(' }); i++; continue; }
    if (expr[i] === ')') { tokens.push({ type: 'RPAREN', value: ')' }); i++; continue; }
    if (expr[i] === ',') { tokens.push({ type: 'COMMA', value: ',' }); i++; continue; }
    if (expr[i] === ';') { tokens.push({ type: 'SEMICOLON', value: ';' }); i++; continue; }
    if (expr[i] === '.') { tokens.push({ type: 'DOT', value: '.' }); i++; continue; }
    i++; // Skip unknown chars
  }
  return tokens;
}

// AST node types
// { type: 'chain', name: string, body: ASTNode }
// { type: 'then', children: ASTNode[] }
// { type: 'when', children: ASTNode[] }
// { type: 'switch', expression: string, cases: ASTNode[] }
// { type: 'if', expression: string, trueBranch: ASTNode, falseBranch: ASTNode }
// { type: 'for', expression: string, body: ASTNode }
// { type: 'while', expression: string, body: ASTNode }
// { type: 'node', label: string }

class Parser {
  constructor(tokens) {
    this.tokens = tokens;
    this.pos = 0;
  }

  peek() { return this.tokens[this.pos]; }

  consume(expectedType) {
    const t = this.tokens[this.pos];
    if (expectedType && t && t.type !== expectedType) {
      throw new Error(`Expected ${expectedType} but got ${t.type} at position ${this.pos}`);
    }
    this.pos++;
    return t;
  }

  parseChain() {
    const name = 'chain1';
    // skip optional semicolons at start
    while (this.peek() && this.peek().type === 'SEMICOLON') this.consume();
    const body = this.parseExpression();
    while (this.peek() && this.peek().type === 'SEMICOLON') this.consume();
    return { type: 'chain', name, body };
  }

  parseExpression() {
    const t = this.peek();
    if (!t) return null;
    if (['THEN', 'WHEN', 'SWITCH', 'IF', 'FOR', 'WHILE'].includes(t.type)) {
      return this.parseKeywordExpr();
    }
    if (t.type === 'IDENTIFIER') {
      return this.parseIdentifier();
    }
    return null;
  }

  parseKeywordExpr() {
    const kw = this.consume();
    const type = kw.type;

    if (type === 'THEN' || type === 'WHEN') {
      this.consume('LPAREN');
      const children = [];
      while (this.peek() && this.peek().type !== 'RPAREN') {
        if (this.peek().type === 'COMMA') { this.consume(); continue; }
        const child = this.parseExpression();
        if (child) children.push(child);
        else break;
      }
      this.consume('RPAREN');
      return { type: type.toLowerCase(), children };
    }

    if (type === 'SWITCH' || type === 'IF') {
      this.consume('LPAREN');
      let expression = '';
      while (this.peek() && this.peek().type !== 'RPAREN') {
        if (this.peek().type === 'COMMA') { this.consume(); expression += ', '; continue; }
        expression += this.consume().value;
      }
      this.consume('RPAREN');

      if (type === 'SWITCH') {
        // SWITCH(x).to(A, B, ...)
        const cases = [];
        if (this.peek() && this.peek().type === 'DOT') {
          this.consume('DOT');
          const nextTok = this.peek();
          if (nextTok && nextTok.type === 'IDENTIFIER' && nextTok.value.toLowerCase() === 'data') {
            // .data(varName) before .to()
            this.consume(); // 'data'
            this.consume('LPAREN');
            let dataRef = null;
            if (this.peek() && this.peek().type !== 'RPAREN') {
              dataRef = this.consume().value;
            }
            this.consume('RPAREN');
            // Continue with .to() if present
            if (this.peek() && this.peek().type === 'DOT') {
              this.consume('DOT');
              this.consume('TO');
              this.consume('LPAREN');
              while (this.peek() && this.peek().type !== 'RPAREN') {
                if (this.peek().type === 'COMMA') { this.consume(); continue; }
                const child = this.parseExpression();
                if (child) cases.push(child);
                else break;
              }
              this.consume('RPAREN');
            }
            return { type: 'switch', expression, cases, dataRef };
          } else {
            this.consume('TO');
            this.consume('LPAREN');
            while (this.peek() && this.peek().type !== 'RPAREN') {
              if (this.peek().type === 'COMMA') { this.consume(); continue; }
              const child = this.parseExpression();
              if (child) cases.push(child);
              else break;
            }
            this.consume('RPAREN');
          }
        }
        // Check for .data() after .to()
        let dataRef = null;
        if (this.peek() && this.peek().type === 'DOT') {
          this.consume('DOT');
          const methodTok = this.peek();
          if (methodTok && methodTok.type === 'IDENTIFIER' && methodTok.value.toLowerCase() === 'data') {
            this.consume(); // 'data'
            this.consume('LPAREN');
            if (this.peek() && this.peek().type !== 'RPAREN') {
              dataRef = this.consume().value;
            }
            this.consume('RPAREN');
          }
        }
        return { type: 'switch', expression, cases, dataRef };
      } else {
        // IF(x, trueBranch, falseBranch)
        // Check for .data() after IF parens
        let dataRef = null;
        if (this.peek() && this.peek().type === 'DOT') {
          this.consume('DOT');
          const methodTok = this.peek();
          if (methodTok && methodTok.type === 'IDENTIFIER' && methodTok.value.toLowerCase() === 'data') {
            this.consume(); // 'data'
            this.consume('LPAREN');
            if (this.peek() && this.peek().type !== 'RPAREN') {
              dataRef = this.consume().value;
            }
            this.consume('RPAREN');
          }
        }
        const result = this.parseIfFromExpression(expression, type);
        if (dataRef) result.dataRef = dataRef;
        return result;
      }
    }

    if (type === 'FOR' || type === 'WHILE') {
      this.consume('LPAREN');
      let expression = '';
      while (this.peek() && this.peek().type !== 'RPAREN') {
        expression += this.consume().value;
      }
      this.consume('RPAREN');

      let body = null;
      let dataRef = null;

      // Check for .data() or .DO()
      if (this.peek() && this.peek().type === 'DOT') {
        this.consume('DOT');
        const methodTok = this.peek();
        if (methodTok && methodTok.type === 'IDENTIFIER' && methodTok.value.toLowerCase() === 'data') {
          // .data(varName)
          this.consume(); // 'data'
          this.consume('LPAREN');
          if (this.peek() && this.peek().type !== 'RPAREN') {
            dataRef = this.consume().value;
          }
          this.consume('RPAREN');
          // Check for .DO() after .data()
          if (this.peek() && this.peek().type === 'DOT') {
            this.consume('DOT');
            this.consume('DO');
            this.consume('LPAREN');
            if (this.peek() && this.peek().type !== 'RPAREN') {
              body = this.parseExpression();
            }
            this.consume('RPAREN');
          }
        } else {
          // .DO(body)
          this.consume('DO');
          this.consume('LPAREN');
          if (this.peek() && this.peek().type !== 'RPAREN') {
            body = this.parseExpression();
          }
          this.consume('RPAREN');
        }
      }

      // Check for .data() after .DO()
      if (!dataRef && this.peek() && this.peek().type === 'DOT') {
        this.consume('DOT');
        const methodTok = this.peek();
        if (methodTok && methodTok.type === 'IDENTIFIER' && methodTok.value.toLowerCase() === 'data') {
          this.consume(); // 'data'
          this.consume('LPAREN');
          if (this.peek() && this.peek().type !== 'RPAREN') {
            dataRef = this.consume().value;
          }
          this.consume('RPAREN');
        }
      }

      return { type: type.toLowerCase(), expression, body, dataRef };
    }
  }

  parseIfFromExpression(expression, type) {
    // IF(x, trueExpr, falseExpr)
    // expression contains "x, trueExpr, falseExpr" split by top-level commas
    const parts = splitTopLevel(expression);
    const condExpr = parts[0] ? parts[0].trim() : '';
    let trueBranch = null;
    let falseBranch = null;
    if (parts.length >= 2 && parts[1].trim()) {
      trueBranch = parseEL(parts[1].trim());
    }
    if (parts.length >= 3 && parts[2].trim()) {
      falseBranch = parseEL(parts[2].trim());
    }
    return { type: 'if', expression: condExpr, trueBranch, falseBranch };
  }

  parseIdentifier() {
    const t = this.consume();
    const label = t.value;

    // Check for .data(varName) pattern
    let dataRef = null;
    if (this.peek() && this.peek().type === 'DOT') {
      this.consume('DOT');
      const methodTok = this.peek();
      if (methodTok && methodTok.type === 'IDENTIFIER' && methodTok.value.toLowerCase() === 'data') {
        this.consume(); // consume 'data'
        this.consume('LPAREN');
        if (this.peek() && this.peek().type !== 'RPAREN') {
          dataRef = this.consume().value;
        }
        this.consume('RPAREN');
      } else {
        // Unknown method, backtrack by pushing tokens back - skip for now
        // For safety, just return plain node
      }
    }

    return { type: 'node', label, dataRef };
  }
}

// Improved IF parsing: re-tokenize IF expressions properly
function parseIFSpecial(expr) {
  // expr is like "x, trueBody, falseBody" after IF(
  // We need to split by top-level commas
  const parts = splitTopLevel(expr);
  if (parts.length >= 1) {
    const condExpr = parts[0].trim();
    let trueBranch = null, falseBranch = null;
    if (parts.length >= 2) {
      trueBranch = parseEL(parts[1].trim());
    }
    if (parts.length >= 3) {
      falseBranch = parseEL(parts[2].trim());
    }
    return { type: 'if', expression: condExpr, trueBranch, falseBranch };
  }
  return { type: 'if', expression: expr, trueBranch: null, falseBranch: null };
}

// Split string by top-level commas (not inside parens)
function splitTopLevel(s) {
  const parts = [];
  let depth = 0;
  let current = '';
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (ch === '(') { depth++; current += ch; }
    else if (ch === ')') { depth--; current += ch; }
    else if (ch === ',' && depth === 0) {
      parts.push(current);
      current = '';
    } else {
      current += ch;
    }
  }
  if (current.trim()) parts.push(current);
  return parts;
}

function parseEL(exprStr) {
  if (!exprStr || !exprStr.trim()) return null;
  const tokens = tokenize(exprStr);
  if (tokens.length === 0) return null;

  // Handle IF specially
  // IF(cond, true, false) pattern
  const ifMatch = exprStr.match(/^\s*IF\s*\(/i);
  if (ifMatch) {
    // Extract content inside IF(...)
    const content = extractParenContent(exprStr, ifMatch[0].length - 1);
    if (content !== null) {
      return parseIFSpecial(content);
    }
  }

  const parser = new Parser(tokens);
  return parser.parseExpression();
}

// Extract content inside first pair of parentheses
function extractParenContent(s, startIdx) {
  let depth = 0;
  for (let i = startIdx; i < s.length; i++) {
    if (s[i] === '(') depth++;
    else if (s[i] === ')') {
      depth--;
      if (depth === 0) {
        return s.substring(startIdx + 1, i);
      }
    }
  }
  return null;
}

// ----- AST to Nodes & Connections -----
// Convert parsed EL AST into state.nodes and state.connections
//
// Key principle: Every node/subtree returns its "exit" ID — the node from which
// the next sibling connects. For branching structures (WHEN/SWITCH/IF), all
// branch tails converge to a shared junction node, and that junction is the exit.
let elLayoutCounter = { x: 60, y: 60 };

function astToGraph(ast, chainName = 'chain1') {
  state.nodes = [];
  state.connections = [];
  state.nextId = 1;
  elLayoutCounter = { x: 60, y: 60 };

  if (!ast) return;

  // Start node - use chain name as label
  const startLabel = chainName || 'chain1';
  const startId = generateId();
  state.nodes.push({ id: startId, type: 'start', label: startLabel, x: 50, y: 250, expression: '' });

  if (ast.type === 'chain') {
    const exitResult = processASTNode(ast.body, startId, 250);
    // End node — connect from all exit points
    if (exitResult) {
      const endNodeId = generateId();
      state.nodes.push({ id: endNodeId, type: 'end', label: '结束', x: elLayoutCounter.x + 140, y: 250, expression: '' });
      const exitIds = Array.isArray(exitResult) ? exitResult : [exitResult];
      exitIds.forEach(eid => {
        state.connections.push({ id: generateId(), from: eid, to: endNodeId });
      });
    }
  } else {
    processASTNode(ast, startId, 250);
  }
}

function processASTNode(astNode, fromId, baseY) {
  if (!astNode) return fromId;

  switch (astNode.type) {
    case 'then': return processThen(astNode, fromId, baseY);
    case 'when': return processWhen(astNode, fromId, baseY);
    case 'switch': return processSwitch(astNode, fromId, baseY);
    case 'if': return processIf(astNode, fromId, baseY);
    case 'for': return processFor(astNode, fromId, baseY);
    case 'while': return processWhile(astNode, fromId, baseY);
    case 'node': return processSimpleNode(astNode, fromId, baseY);
    default: return fromId;
  }
}

function createNode(type, label, x, y, expression = '', dataRef = null) {
  const id = generateId();
  const nodeData = dataRef ? (_importDataVars[dataRef] || '') : '';
  state.nodes.push({ id, type, label, x, y, expression, data: nodeData });
  return id;
}

function connect(fromId, toId) {
  // Avoid duplicate connections
  const exists = state.connections.some(c => c.from === fromId && c.to === toId);
  if (!exists) {
    state.connections.push({ id: generateId(), from: fromId, to: toId });
  }
}

const H_SPACING = 120;
const V_SPACING = 80;

// THEN: serial chain. Each child's exit feeds the next child's entry.
// Returns either a single exit ID or an array of exit IDs (for branches).
function processThen(astNode, fromId, baseY) {
  let entryId = fromId;
  let exitId = fromId;

  for (const child of astNode.children) {
    // If entryId is an array, the next child should connect from ALL of them
    // (e.g., after SWITCH or WHEN, the next node in THEN gets all branch exits)
    exitId = processASTNode(child, entryId, baseY);
    entryId = exitId;
  }

  return exitId;
}

// WHEN: parallel branches. Each branch starts from fromId.
// Returns all branch exit IDs as an array (no junction node).
// The caller (THEN) connects the next sibling to all branch exits.
function processWhen(astNode, fromId, baseY) {
  const branchCount = astNode.children.length;
  const totalHeight = (branchCount - 1) * V_SPACING;
  const startY = baseY - totalHeight / 2;

  const branchExits = [];
  const savedX = elLayoutCounter.x;

  astNode.children.forEach((child, idx) => {
    elLayoutCounter.x = savedX;
    const childY = startY + idx * V_SPACING;

    const childExit = processASTNode(child, fromId, childY);
    if (childExit) {
      if (Array.isArray(childExit)) {
        branchExits.push(...childExit);
      } else {
        branchExits.push(childExit);
      }
    }
  });

  // Deduplicate
  const uniqueExits = [...new Set(branchExits)];

  // Find max X among all branch exits
  let maxExitX = 0;
  uniqueExits.forEach(eid => {
    const n = getNodeById(eid);
    if (n && n.x > maxExitX) maxExitX = n.x;
  });
  elLayoutCounter.x = maxExitX + H_SPACING;

  // Return all branch exits directly — no junction node
  if (uniqueExits.length === 1) return uniqueExits[0];
  return uniqueExits;
}

// SWITCH: branching. Switch node → each case.
// Returns all case exit IDs as an array (no junction node).
function processSwitch(astNode, fromId, baseY) {
  const switchId = createNode('switch', 'SWITCH', elLayoutCounter.x, baseY, astNode.expression || 'x', astNode.dataRef || null);
  if (Array.isArray(fromId)) {
    fromId.forEach(fid => connect(fid, switchId));
  } else {
    connect(fromId, switchId);
  }

  const caseCount = astNode.cases.length;
  const totalHeight = (caseCount - 1) * V_SPACING;
  const startY = baseY - totalHeight / 2;
  const savedX = elLayoutCounter.x;

  const caseExits = [];
  astNode.cases.forEach((child, idx) => {
    elLayoutCounter.x = savedX + H_SPACING;
    const childY = startY + idx * V_SPACING;

    const caseExit = processASTNode(child, switchId, childY);
    if (caseExit) {
      if (Array.isArray(caseExit)) {
        caseExits.push(...caseExit);
      } else {
        caseExits.push(caseExit);
      }
    }
  });

  // Deduplicate
  const uniqueExits = [...new Set(caseExits)];

  // Find max X among case exits
  let maxExitX = savedX + H_SPACING;
  uniqueExits.forEach(eid => {
    const n = getNodeById(eid);
    if (n && n.x > maxExitX) maxExitX = n.x;
  });
  elLayoutCounter.x = maxExitX + H_SPACING;

  // Return all case exits directly — no junction node
  if (uniqueExits.length === 1) return uniqueExits[0];
  return uniqueExits;
}

// IF: condition → true/false branch
// Returns all branch exit IDs (no junction node).
function processIf(astNode, fromId, baseY) {
  const ifId = createNode('if', 'IF', elLayoutCounter.x, baseY, astNode.expression || 'x', astNode.dataRef || null);
  if (Array.isArray(fromId)) {
    fromId.forEach(fid => connect(fid, ifId));
  } else {
    connect(fromId, ifId);
  }

  const savedX = elLayoutCounter.x;
  const trueY = baseY - V_SPACING / 2;
  const falseY = baseY + V_SPACING / 2;

  const branchExits = [];

  if (astNode.trueBranch) {
    elLayoutCounter.x = savedX + H_SPACING;
    const trueExit = processASTNode(astNode.trueBranch, ifId, trueY);
    if (trueExit) {
      if (Array.isArray(trueExit)) branchExits.push(...trueExit);
      else branchExits.push(trueExit);
    }
  }

  if (astNode.falseBranch) {
    elLayoutCounter.x = savedX + H_SPACING;
    const falseExit = processASTNode(astNode.falseBranch, ifId, falseY);
    if (falseExit) {
      if (Array.isArray(falseExit)) branchExits.push(...falseExit);
      else branchExits.push(falseExit);
    }
  }

  // Deduplicate
  const uniqueExits = [...new Set(branchExits)];

  let maxExitX = savedX + H_SPACING;
  uniqueExits.forEach(eid => {
    const n = getNodeById(eid);
    if (n && n.x > maxExitX) maxExitX = n.x;
  });
  elLayoutCounter.x = maxExitX + H_SPACING;

  if (uniqueExits.length === 0) return ifId;
  if (uniqueExits.length === 1) return uniqueExits[0];
  return uniqueExits;
}

// FOR: loop node → body (no junction node)
function processFor(astNode, fromId, baseY) {
  const forId = createNode('for', 'FOR', elLayoutCounter.x, baseY, astNode.expression || '3', astNode.dataRef || null);
  if (Array.isArray(fromId)) {
    fromId.forEach(fid => connect(fid, forId));
  } else {
    connect(fromId, forId);
  }

  if (astNode.body) {
    elLayoutCounter.x += H_SPACING;
    const bodyExit = processASTNode(astNode.body, forId, baseY);
    elLayoutCounter.x += H_SPACING;
    return bodyExit || forId;
  }

  elLayoutCounter.x += H_SPACING;
  return forId;
}

// WHILE: loop node → body (no junction node)
function processWhile(astNode, fromId, baseY) {
  const whileId = createNode('while', 'WHILE', elLayoutCounter.x, baseY, astNode.expression || 'w', astNode.dataRef || null);
  if (Array.isArray(fromId)) {
    fromId.forEach(fid => connect(fid, whileId));
  } else {
    connect(fromId, whileId);
  }

  if (astNode.body) {
    elLayoutCounter.x += H_SPACING;
    const bodyExit = processASTNode(astNode.body, whileId, baseY);
    elLayoutCounter.x += H_SPACING;
    return bodyExit || whileId;
  }

  elLayoutCounter.x += H_SPACING;
  return whileId;
}

function processSimpleNode(astNode, fromId, baseY) {
  const nodeId = createNode('normal', astNode.label, elLayoutCounter.x, baseY, '', astNode.dataRef || null);
  if (Array.isArray(fromId)) {
    fromId.forEach(fid => connect(fid, nodeId));
  } else {
    connect(fromId, nodeId);
  }
  elLayoutCounter.x += H_SPACING;
  return nodeId;
}

// Append a chain AST to the current graph (does NOT clear existing nodes).
// Returns the Y position for the next chain.
function appendChainFromAST(ast, chainName = 'chain1', yOffset = 0) {
  const baseY = 250 + yOffset;
  elLayoutCounter = { x: 60, y: baseY };

  // Start node - use chain name as label
  const startLabel = chainName || 'chain1';
  const startId = generateId();
  state.nodes.push({ id: startId, type: 'start', label: startLabel, x: 50, y: baseY, expression: '' });

  let body = ast;
  if (ast.type === 'chain') body = ast.body;

  if (body) {
    const exitResult = processASTNode(body, startId, baseY);

    // End node
    if (exitResult) {
      const endNodeId = generateId();
      const endX = Math.max(elLayoutCounter.x + 140, 200);
      state.nodes.push({ id: endNodeId, type: 'end', label: '结束', x: endX, y: baseY, expression: '' });
      const exitIds = Array.isArray(exitResult) ? exitResult : [exitResult];
      exitIds.forEach(eid => {
        state.connections.push({ id: generateId(), from: eid, to: endNodeId });
      });
    }
  }

  // Return the max Y used by nodes in this chain, plus gap
  let maxY = baseY;
  state.nodes.forEach(n => { if (n.y > maxY) maxY = n.y; });
  return maxY + 100;
}

// ----- XML Import -----
function importXMLString(xmlStr) {
  // Parse XML to extract EL expression
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlStr, 'text/xml');

  // Check for parse error
  const parseError = doc.querySelector('parsererror');
  if (parseError) {
    showToast('XML解析失败: ' + parseError.textContent);
    return;
  }

  // Support both <flow><chain>...</chain></flow> and multiple <chain>...</chain> formats
  const chainEls = doc.querySelectorAll('flow > chain, chain');
  if (!chainEls || chainEls.length === 0) {
    showToast('未找到 &lt;chain&gt; 元素');
    return;
  }

  // Clear current canvas once
  state.nodes = [];
  state.connections = [];
  state.selectedNodeId = null;
  state.selectedConnectionId = null;
  state.nextId = 1;
  canvas.querySelectorAll('.canvas-node').forEach(el => el.remove());
  svgLayer.innerHTML = '';

  let yOffset = 0;
  let totalNodes = 0;

  chainEls.forEach(chainEl => {
    const chainName = chainEl.getAttribute('name') || 'chain1';
    let elExpr = chainEl.textContent.trim();

    // Extract data assignments: cmpData = '...' or cmpDataN = '...'
    _importDataVars = {};
    elExpr = elExpr.replace(/^(\s*cmpData\d*\s*=\s*'((?:[^'\\]|\\.)*)'\s*;\s*)+/gm, (match) => {
      // Match individual assignments
      const assignRe = /cmpData(\d*)\s*=\s*'((?:[^'\\]|\\.)*)'/g;
      let m;
      while ((m = assignRe.exec(match)) !== null) {
        const varName = 'cmpData' + (m[1] || '');
        // Unescape: \\ -> \, \' -> '
        const dataJson = m[2].replace(/\\'/g, "'").replace(/\\\\/g, '\\');
        _importDataVars[varName] = dataJson;
      }
      return ''; // Remove the assignments from the EL expression
    });

    // Remove trailing semicolon
    elExpr = elExpr.replace(/;\s*$/, '');

    if (!elExpr) {
      // Empty chain - just add a start node
      const startLabel = chainName || 'chain1';
      const startId = generateId();
      state.nodes.push({ id: startId, type: 'start', label: startLabel, x: 50, y: 250 + yOffset, expression: '' });
      yOffset += 100;
      totalNodes++;
      return;
    }

    try {
      const ast = parseEL(elExpr);
      if (!ast) {
        console.warn('Skipping chain - EL表达式解析失败:', chainName);
        return;
      }

      // Wrap in chain AST
      const chainAST = ast.type === 'chain' ? ast : { type: 'chain', name: chainName, body: ast };

      // Append chain to graph
      const nextY = appendChainFromAST(chainAST, chainName, yOffset);
      yOffset = nextY - 250; // Convert back to offset from base 250
      totalNodes = state.nodes.length;
    } catch (e) {
      console.error('EL parse error:', e);
      showToast('EL表达式解析错误: ' + e.message);
    }
  });

  // Render
  renderAllNodes();
  updateXML();
  updatePropertiesPanel(null);
  updateMinimap();

  showToast(`已导入 ${chainEls.length} 个chain (${totalNodes} 个节点)`);
}

// index.html?name=chain1	需要在服务器上运行.
// ----- Auto-import from URL parameter -----
function autoImportFromURL() {
  const params = new URLSearchParams(window.location.search);
  const name = params.get('name');
  if (!name) return;

  // Fetch the XML file
  fetch(name + '.xml')
    .then(response => {
      if (!response.ok) throw new Error('文件未找到: ' + name + '.xml');
      return response.text();
    })
    .then(xmlStr => {
      importXMLString(xmlStr);
    })
    .catch(err => {
      console.warn('自动导入失败:', err.message);
      showToast('自动导入失败: ' + err.message);
    });
}

// ----- Tab Switching -----
(function initTabs() {
  const tabBtns = document.querySelectorAll('.tab-btn');
  tabBtns.forEach(btn => {
    btn.addEventListener('click', function() {
      const tabName = this.getAttribute('data-tab');
      // Update active tab button
      tabBtns.forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      // Update active tab content
      document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
      const targetTab = document.getElementById(tabName === 'properties' ? 'tabProperties' : 'tabXml');
      if (targetTab) targetTab.classList.add('active');
    });
  });
})();

// ----- Initialize -----
renderAllNodes();
updateXML();
updateMinimap();

// Initial minimap render after DOM ready
setTimeout(updateMinimap, 100);

// Auto-import from URL parameter (after a small delay to ensure DOM is ready)
setTimeout(autoImportFromURL, 200);

console.log('EL规则可视化设计器已就绪');
</script>
