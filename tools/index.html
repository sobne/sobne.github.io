<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        h1 {
            color: #fff;
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .subtitle {
            color: rgba(255,255,255,0.8);
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 50px;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .nav-card {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 30px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
        }

        .nav-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
            background: #fff;
        }

        .nav-icon {
            width: 60px;
            height: 60px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 15px;
        }

        .nav-card h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: #2d3748;
        }

        .nav-card p {
            font-size: 0.9rem;
            color: #718096;
            line-height: 1.5;
        }

        .nav-card .arrow {
            margin-top: 15px;
            color: #667eea;
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .nav-card:hover .arrow {
            opacity: 1;
        }

        /* 不同卡片的配色 */
        .card-el .nav-icon { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .card-form .nav-icon { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .card-table .nav-icon { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .card-chart .nav-icon { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .card-settings .nav-icon { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
        .card-help .nav-icon { background: linear-gradient(135deg, #d299c2 0%, #fef9d7 100%); }

        footer {
            margin-top: 60px;
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧭 在线工具</h1>
        <p class="subtitle">快速访问各类工具与设计器</p>

        <div class="nav-grid">
            <!-- EL设计器 -->
            <a href="EL/index.html" target="_blank" class="nav-card card-el">
                <div class="nav-icon">⚡</div>
                <h3>EL设计器</h3>
                <p>表达式语言设计与编辑工具，支持复杂逻辑配置</p>
                <span class="arrow">→</span>
            </a>

            <a href="sse_client.html" target="_blank" class="nav-card card-form">
                <div class="nav-icon">📝</div>
                <h3>SSE客户端</h3>
                <p>SSE客户端工具</p>
                <span class="arrow">→</span>
            </a>

            <a href="websocket client.html" target="_blank" class="nav-card card-table">
                <div class="nav-icon">📊</div>
                <h3>websocket客户端</h3>
                <p>websocket client工具</p>
                <span class="arrow">→</span>
            </a>

            <!-- 图表设计器 -->
            <a href="chart.html" target="_blank" class="nav-card card-chart">
                <div class="nav-icon">📈</div>
                <h3>图表设计器</h3>
                <p>数据可视化图表配置与预览</p>
                <span class="arrow">→</span>
            </a>

            <!-- 系统设置 -->
            <a href="settings.html" target="_blank" class="nav-card card-settings">
                <div class="nav-icon">⚙️</div>
                <h3>系统设置</h3>
                <p>全局参数配置与系统管理</p>
                <span class="arrow">→</span>
            </a>

            <!-- 帮助文档 -->
            <a href="help.html" target="_blank" class="nav-card card-help">
                <div class="nav-icon">📖</div>
                <h3>帮助文档</h3>
                <p>使用指南与常见问题解答</p>
                <span class="arrow">→</span>
            </a>
        </div>
    </div>

    <footer>
        <p>© 2026 导航中心 · 点击卡片即可跳转</p>
    </footer>
</body>
</html>
